name: TrustRadar Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *" # 매일 07:00 UTC (KST 16:00)

permissions:
  contents: write
  pages: write
  id-token: write

env:
  RADAR_CATEGORY: trust   # 카테고리 YAML 이름을 여기에 맞게 수정하세요.
  TZ: Asia/Seoul

concurrency:
  group: trustradar-collection
  cancel-in-progress: false

jobs:
  run-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Radar
        run: |
          python main.py --category "${{ env.RADAR_CATEGORY }}" --recent-days 7 --keep-days 90 --generate-report

      - name: Auto-commit data updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update trustradar data"
          file_pattern: data/*.duckdb

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./reports
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "docs: update trustradar report"

      - name: Archive DuckDB (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trustradar-db-${{ github.run_number }}
          path: data/trustradar_data.duckdb
          retention-days: 7
          if-no-files-found: ignore

      - name: Archive reports (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trustradar-reports-${{ github.run_number }}
          path: reports/
          retention-days: 7
          if-no-files-found: warn
