      - "consumer"
      - "customer"
      - "user"
      - "safety"
      - "recall"
      - "complaint"
      - "review"
      - "rating"
      - "refund"
      - "warranty"
      - "scam"
      - "deceptive"
      - "misleading"
      - "class action"
      - "rights"
