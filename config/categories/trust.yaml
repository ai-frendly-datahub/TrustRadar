category_name: "trust"
display_name: "리뷰/평판 레이더"

sources:
  - name: "TechCrunch"
    type: "rss"
    url: "https://techcrunch.com/feed/"
  - name: "The Verge"
    type: "rss"
    url: "https://www.theverge.com/rss/index.xml"
  - name: "Consumer Reports"
    type: "rss"
    url: "https://www.consumerreports.org/feed/"

entities:
  - name: "ReviewQuality"
    display_name: "리뷰 품질"
