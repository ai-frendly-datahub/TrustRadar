category_name: trust
display_name: 보안/개인정보 레이더

data_quality:
  priority: P0
  primary_motion: compliance-risk
  weakest_dimension: verification
  quality_outputs:
    freshness_report: reports/trust_quality.json
    dated_freshness_report_pattern: reports/trust_YYYYMMDD_quality.json
    tracked_event_models:
    - incident_disclosure
    - status_page_incident
    - enforcement_action
    - consumer_complaint
    - ai_asset_risk
  event_models:
  - incident_disclosure
  - status_page_incident
  - enforcement_action
  - consumer_complaint
  - ai_asset_risk
  canonical_keys:
    incident:
      fields:
      - source
      - affected_entity
      - incident_type
      - disclosed_at
    enforcement_case:
      fields:
      - agency
      - case_name
      - action_date
    status_incident:
      fields:
      - service
      - status
      - observed_at
    complaint:
      fields:
      - source
      - company
      - complaint_type
  freshness_sla:
    incident_disclosure:
      max_age_days: 1
      stale_after_days: 3
    status_page_incident:
      max_age_days: 1
      stale_after_days: 2
    enforcement_action:
      max_age_days: 1
      stale_after_days: 3
    consumer_complaint:
      max_age_days: 2
      stale_after_days: 7
    ai_asset_risk:
      max_age_days: 7
      stale_after_days: 30
  quality_gates:
  - 공식 disclosure와 시장/커뮤니티 보도를 분리
  - 사고 발생일·공개일·해결일·수집일을 별도 필드로 유지
  - 커뮤니티 신호는 official_confirmation_required 상태로만 병합
  - 취약점, 장애, 개인정보 사고, AI 자산 리스크를 같은 incident로 병합하지 않음

source_backlog:
  status_page_candidates:
  - id: official_status_pages
    name: Official vendor status pages
    url: ""
    layer: operational
    event_model: status_page_incident
    activation_gate: service id mapping, incident permalink, resolved_at parser 검증 후 활성화
  - id: statuspage_io_incident_feeds
    name: Statuspage.io incident feeds
    url: ""
    layer: operational
    event_model: status_page_incident
    activation_gate: vendor별 public feed 접근성, rate limit, status taxonomy 검증 후 활성화
  incident_disclosure_candidates:
  - id: state_attorney_general_breach_notices
    name: US state attorney general breach notices
    url: ""
    layer: official
    event_model: incident_disclosure
    activation_gate: 주별 schema 차이, affected count, disclosed_at parser 검증 후 활성화
  - id: hhs_ocr_breach_portal
    name: HHS OCR breach portal
    url: https://ocrportal.hhs.gov/ocr/breach/breach_report.jsf
    layer: official
    event_model: incident_disclosure
    activation_gate: query form, covered entity, individuals affected parser 검증 후 활성화
  complaint_candidates:
  - id: cfpb_complaint_database
    name: CFPB Consumer Complaint Database
    url: https://www.consumerfinance.gov/data-research/consumer-complaints/
    layer: official
    event_model: consumer_complaint
    activation_gate: 개인정보 비식별성, company normalization, complaint status mapping 검증 후 활성화
