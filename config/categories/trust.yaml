entities:
  - name: "Vulnerability"
    display_name: "취약점"
    keywords:
      - "vulnerability"
      - "취약점"
      - "CVE"
      - "exploit"
      - "zero-day"
      - "patch"

  - name: "DataBreach"
    display_name: "데이터 유출"
    keywords:
      - "data breach"
      - "데이터 유출"
      - "breach"
      - "leaked"
      - "compromised"
      - "ransomware"

  - name: "Malware"
    display_name: "악성코드"
    keywords:
      - "malware"
      - "악성코드"
      - "virus"
      - "trojan"
      - "worm"
      - "botnet"

  - name: "Threat"
    display_name: "위협"
    keywords:
      - "threat"
      - "위협"
      - "attack"
      - "hacking"
      - "phishing"
      - "social engineering"
      - "zero-day"
      - "supply chain attack"
      - "state-sponsored"
      - "apt"
      - "insider threat"
      - "deepfake"

  - name: "Privacy"
    display_name: "개인정보보호"
    keywords:
      - "privacy"
      - "개인정보"
      - "GDPR"
      - "surveillance"
      - "encryption"
      - "data protection"
      - "tracking"
      - "cookies"
      - "consent"
      - "data collection"
      - "user data"
      - "personal data"
      - "biometric"

  - name: "CorporateTrust"
    display_name: "기업 신뢰/평판"
    keywords:
      - "reputation"
      - "trust"
      - "scandal"
      - "lawsuit"
      - "settlement"
      - "fine"
      - "penalty"
      - "investigation"
      - "accountability"
      - "transparency"
      - "whistleblower"
      - "ethics"
      - "fraud"
      - "corruption"
      - "misconduct"

  - name: "Compliance"
    display_name: "규정 준수"
    keywords:
      - "compliance"
      - "regulation"
      - "regulatory"
      - "gdpr"
      - "ccpa"
      - "ftc"
      - "antitrust"
      - "monopoly"
      - "sanction"
      - "audit"
      - "enforcement"
      - "consent decree"
      - "policy"
      - "legislation"
      - "bill"

  - name: "ConsumerTrust"
    display_name: "소비자 신뢰"
    keywords:
      - "consumer"
      - "customer"
      - "user"
      - "safety"
      - "recall"
      - "complaint"
      - "review"
      - "rating"
      - "refund"
      - "warranty"
      - "scam"
      - "deceptive"
      - "misleading"
      - "class action"
      - "rights"
